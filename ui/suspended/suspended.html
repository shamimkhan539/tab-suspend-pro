<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tab Suspended</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
            background: #f0f2f8;
            color: #1a1d2e;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .card {
            background: #ffffff;
            border: 1px solid #e2e5ef;
            border-radius: 14px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, .08);
            padding: 36px 32px 28px;
            max-width: 480px;
            width: 100%;
            text-align: center;
        }

        .brand {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 28px;
        }

        .brand img {
            width: 32px;
            height: 32px;
            border-radius: 8px;
        }

        .brand-name {
            font-size: 15px;
            font-weight: 700;
            color: #4f46e5;
        }

        .sleep-icon {
            font-size: 48px;
            line-height: 1;
            margin-bottom: 12px;
        }

        h1 {
            font-size: 22px;
            font-weight: 700;
            color: #1a1d2e;
            margin-bottom: 6px;
        }

        .subtitle {
            font-size: 13.5px;
            color: #5a607a;
            margin-bottom: 24px;
        }

        .tab-info {
            background: #f7f8fc;
            border: 1px solid #e2e5ef;
            border-radius: 10px;
            padding: 14px 16px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            text-align: left;
        }

        #favicon {
            width: 22px;
            height: 22px;
            border-radius: 4px;
            flex-shrink: 0;
        }

        .tab-text {
            flex: 1;
            min-width: 0;
        }

        #tab-title {
            font-size: 13.5px;
            font-weight: 600;
            color: #1a1d2e;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        #tab-url {
            font-size: 11.5px;
            color: #9ba3bf;
            margin-top: 3px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        #restore-btn {
            background: #4f46e5;
            color: #fff;
            border: none;
            padding: 12px 32px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: background .15s, transform .1s;
            margin-bottom: 18px;
        }

        #restore-btn:hover {
            background: #4338ca;
            transform: translateY(-1px);
        }

        #restore-btn:active {
            transform: translateY(0);
        }

        .memory-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #ecfdf5;
            color: #10b981;
            border: 1px solid #a7f3d0;
            border-radius: 20px;
            padding: 5px 14px;
            font-size: 12.5px;
            font-weight: 600;
            margin-bottom: 14px;
        }

        .hint {
            font-size: 12px;
            color: #9ba3bf;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="brand">
            <img src="../assets/icons/icon32.png" alt="">
            <span class="brand-name">BrowserGuard Pro</span>
        </div>

        <div class="sleep-icon">💤</div>
        <h1>Tab Suspended</h1>
        <p class="subtitle">This tab has been suspended to save memory.</p>

        <div class="tab-info">
            <img id="favicon" src="" alt="">
            <div class="tab-text">
                <div id="tab-title"></div>
                <div id="tab-url"></div>
            </div>
        </div>

        <button id="restore-btn">Restore Tab</button>

        <div class="memory-badge">
            💾 Memory saved: <span id="memory-estimate">~50 MB</span>
        </div>

        <p class="hint">Click Restore Tab or simply click on this tab to resume.</p>
    </div>

    <script src="suspended.js"></script>
</body>

</html>
